# Buildteam AKS Job Template
#
# This is a template — do not apply directly. Use launch.sh which fills in
# the placeholders and applies the generated YAML.
#
# Placeholders (replaced by launch.sh):
#   __PROJECT_NAME__  — project directory name (e.g. "log-viewer")
#   __MODEL__         — Copilot model (e.g. "claude-opus-4.6")
#   __BUILDERS__      — number of builders (e.g. "2")
#
# To launch a build:
#   ./buildteam-build-on/aks/prepare-spec.sh <project-name> <spec-file>
#   ./buildteam-build-on/aks/launch.sh <project-name> [--model X] [--builders N]

apiVersion: batch/v1
kind: Job
metadata:
  name: buildteam-__PROJECT_NAME__
  namespace: default
spec:
  backoffLimit: 0  # Don't retry on failure
  ttlSecondsAfterFinished: 86400  # Clean up after 24h
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: buildteam-sa
      restartPolicy: Never

      volumes:
        # Docker data (images, layers) — stored on disk, not memory
        - name: docker-data
          emptyDir: {}
        # CSI volume to sync KV secrets into a K8s secret
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: buildteam-kv-secrets

      containers:
        # --- Buildteam container ---
        - name: buildteam
          image: crautodevqqq.azurecr.io/buildteam:latest
          volumeMounts:
            - name: kv-secrets
              mountPath: /mnt/secrets
              readOnly: true
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: buildteam-secrets
                  key: github-token
            - name: BUILDTEAM_KEYVAULT
              value: ""  # Empty — token comes from K8s secret, not KV at runtime
            # -- Blob storage for spec + logs --
            - name: BUILDTEAM_BLOB_ACCOUNT
              value: "stautodevqqq"
            - name: BUILDTEAM_BLOB_CONTAINER
              value: "__PROJECT_NAME__"
            - name: BUILDTEAM_BLOB_SPEC
              value: "REQUIREMENTS.md"
            # -- Logs dir --
            - name: BUILDTEAM_LOGS_DIR
              value: "/workspace/logs"
            # -- Docker via DinD sidecar over TCP --
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
          args:
            - "go"
            - "--directory"
            - "__PROJECT_NAME__"
            - "--model"
            - "__MODEL__"
            - "--builders"
            - "__BUILDERS__"
            - "--spec-file"
            - "/workspace/spec.md"
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "3"
              memory: "12Gi"

        # --- Docker-in-Docker sidecar ---
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-data
              mountPath: /var/lib/docker
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""  # Disable TLS — buildteam connects via tcp://localhost:2375
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "4Gi"
