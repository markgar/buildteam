apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: buildteam-kv-secrets
  namespace: default
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "14d79474-03b9-43ea-aab0-6da97deb85f2"
    keyvaultName: "kv-autodev-dev"
    tenantId: "86289156-afdb-4440-9b1a-3d8764de69e1"
    objects: |
      array:
        - |
          objectName: githubpat
          objectType: secret
  secretObjects:
    - secretName: buildteam-secrets
      type: Opaque
      data:
        - objectName: githubpat
          key: github-token
